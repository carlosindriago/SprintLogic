services:
  postgres:
    image: postgres:16-alpine
    container_name: sprintlogic-postgres
    environment:
      POSTGRES_USER: sprintlogic
      POSTGRES_PASSWORD: sprintlogic
      POSTGRES_DB: sprintlogic_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sprintlogic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: sprintlogic-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://sprintlogic:sprintlogic@postgres:5432/sprintlogic_dev
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: sprintlogic-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
