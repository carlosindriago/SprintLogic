services:
  postgres:
    image: postgres:16-alpine
    container_name: sprintlogic-postgres
    environment:
      POSTGRES_USER: sprintlogic
      POSTGRES_PASSWORD: sprintlogic
      POSTGRES_DB: sprintlogic_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
