name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  commit-lint:
    name: Validate PR Commits
    runs-on: ubuntu-latest
    # Only run on pull requests, not pushes to main
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-size-check:
    name: Check PR Size Budget
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR Size (Max 400 lines unless size:exception)
        run: |
          ADDITIONS=${{ github.event.pull_request.additions }}
          DELETIONS=${{ github.event.pull_request.deletions }}
          TOTAL=$((ADDITIONS + DELETIONS))
          
          # Check for size:exception label
          LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          
          if [[ "$LABELS" == *"size:exception"* ]]; then
            echo "✅ PR has size:exception label. Skipping size check. ($TOTAL lines)"
            exit 0
          fi
          
          if [ "$TOTAL" -gt 400 ]; then
            echo "❌ PR exceeds 400 changed lines budget ($TOTAL lines)."
            echo "Please split this PR into smaller chunks or add the 'size:exception' label if approved by a maintainer."
            exit 1
          fi
          
          echo "✅ PR size is within budget ($TOTAL lines)."

  test-api:
    name: Run Python Tests (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio
      - name: Run Pytest
        run: pytest

  lint-web:
    name: Run Node.js Lint (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: ./apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Linter
        run: npm run lint
