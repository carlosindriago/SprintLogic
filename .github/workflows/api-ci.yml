name: API CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/api/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/api/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Typecheck with Mypy
      run: |
        mypy .
        
    - name: Test with pytest
      run: |
        pytest
